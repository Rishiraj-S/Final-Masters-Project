# team_code   : Opta 3-letter code used in parquet filenames
# team_code_alt: (optional) secondary code when Opta uses different codes across feeds
# search_name : (optional) override string for matching on Scoresway results page
# country     : used for display / flag assets only (not for path construction)
# competitions: list of competition keys from the block above

# ── Scraper Settings ─────────────────────────────────────────────────────────
scraper:
  timeout_seconds: 60
  cookie_wait_seconds: 3
  scroll_delay: 0.9
  max_pagination_clicks: 50

# ── Downloader Settings ──────────────────────────────────────────────────────
downloader:
  timeout_per_match: 45
  sleep_between_matches: 1.5
  skip_existing: true

# ── Output ───────────────────────────────────────────────────────────────────
output:
  format: "parquet"

  parquet:
    compression: "snappy"
    engine: "pyarrow"

  naming:
    clean_names: true
    lowercase: false
    replace_spaces: "_"
    max_length: 100

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Opposition Pipeline Configuration
# Processes 46 European leagues/competitions for the 2025-2026 season.
#
# results_url is NOT hardcoded here — main.py auto-derives it at runtime
# by reading the first link_partido from each league's matches_ids.csv.
# You can override it per-competition by adding a results_url key.

# ── Paths ────────────────────────────────────────────────────────────────────
paths:
  opposition_data_dir: "../data/opposition/raw"
  result_dir: "../data/opposition/result"
  mappings_dir: "../mappings"
  logs_dir: "logs"


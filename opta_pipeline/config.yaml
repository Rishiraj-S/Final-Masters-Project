  results_url: "https://www.scoresway.com/en_GB/soccer/primera-divisi%C3%B3n-2025-2026/80zg2v1cuqcfhphn56u4qpyqc/results"

# Competition Configuration
# Multiple competitions to iterate through when running the pipeline
competitions:
  - id: "3lmujqli8r9m12i28wgjxnnys"
    league_name: "Spain_Copa_del_Rey"
    season: "2025-2026"
    results_url: "https://www.scoresway.com/en_GB/soccer/copa-del-rey-2025-2026/3lmujqli8r9m12i28wgjxnnys/results"

  - id: "80zg2v1cuqcfhphn56u4qpyqc"
    league_name: "Spain_Primera_Division"
    season: "2025-2026"
    results_url: "https://www.scoresway.com/en_GB/soccer/primera-divisi%C3%B3n-2025-2026/80zg2v1cuqcfhphn56u4qpyqc/results"

  - id: "calfow53qyurf0wi9rr96m6tw"
    league_name: "Spain_Super_Cup"
    season: "2025-2026"
    results_url: "https://www.scoresway.com/en_GB/soccer/supercopa-de-espana-2025-2026/calfow53qyurf0wi9rr96m6tw/results"

  - id: "2mr0u0l78k2gdsm79q56tb2fo"
    league_name: "UEFA_Champions_League"
    season: "2025-2026"
    results_url: "https://www.scoresway.com/en_GB/soccer/uefa-champions-league-2025-2026/2mr0u0l78k2gdsm79q56tb2fo/results"

# Default competition (used for backward compatibility and single-competition mode)
competition:
  id: "80zg2v1cuqcfhphn56u4qpyqc"
  league_name: "Spain_Primera_Division"
  season: "2025-2026"
  
# Scraper Settings
scraper:
  timeout_seconds: 60
  cookie_wait_seconds: 3
  scroll_delay: 0.9
  
# Downloader Settings
downloader:
  method: "selenium_wire"
  timeout_per_match: 45
  sleep_between_matches: 1.5
  skip_existing: true
  
  # Data types to capture
  capture:
    matchevent: true      # Event-by-event data
    match: true           # Basic match information
  
# Paths
paths:
  data_dir: "../data/barcelona"
  mappings_dir: "../mappings"
  target_dir: "../data/barcelona/target"
  result_dir: "../data/barcelona/result"
  logs_dir: "logs"
  
# Output Configuration
output:
  format: "parquet"
  
  parquet:
    compression: "snappy"
    engine: "pyarrow"
    
  optimization:
    convert_dtypes: true
    deduplicate_events: true
    
  extract:
    match_info: true          # Extract basic match data
    match_events: true        # Extract event data
    
  # Filename pattern for match files
  naming:
    pattern: "{date}_{home_code}_vs_{away_code}"
    clean_names: true
    lowercase: false
    replace_spaces: "_"
    max_length: 100
    include_match_id: "suffix"  # suffix, prefix, or none
    
# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
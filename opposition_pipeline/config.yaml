# ── Paths ─────────────────────────────────────────────────────────────────────
paths:
  result_dir: "../data/opposition"
  target_dir: "../data/opposition/target"
  mappings_dir: "../mappings"
  logs_dir:    "logs"

# ── Scraper settings ──────────────────────────────────────────────────────────
scraper:
  timeout_seconds: 60
  cookie_wait_seconds: 3
  scroll_delay: 0.9
  max_pagination_clicks: 50
  # Scrape cache TTL: re-scrape a competition page only when the cached CSV
  # is older than this many days.  Keeps the match list fresh without
  # re-hitting Scoresway on every button click.
  cache_ttl_days: 1

# ── Downloader settings ───────────────────────────────────────────────────────
downloader:
  method: "selenium_wire"
  timeout_per_match: 45
  sleep_between_matches: 1.5
  skip_existing: true
  capture:
    matchevent: true
    match: true

# ── Output settings ───────────────────────────────────────────────────────────
output:
  format: "parquet"
  parquet:
    compression: "snappy"
    engine: "pyarrow"
  optimization:
    convert_dtypes: true
    deduplicate_events: true
  extract:
    match_info: true
    match_events: true
  naming:
    pattern: "{date}_{home_code}_vs_{away_code}"
    clean_names: true
    lowercase: false
    replace_spaces: "_"
    max_length: 100
    include_match_id: "suffix"

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

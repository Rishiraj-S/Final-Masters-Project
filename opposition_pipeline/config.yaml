#
# Output structure:
#   data/opposition/{country}/{team_name}/{competition}/2025-2026/match_event/*.parquet
#
# Key design: each competition page is scraped ONCE and cached; matches are
# then filtered per opponent — no redundant Scoresway requests.

season: "2025-2026"

